version: "0.5"

processes:
  local-llm:
    command: "bash scripts/run-local-llm.sh"
    working_dir: "."
    availability:
      restart: on_failure
      backoff_seconds: 2
      max_restarts: 3

  web:
    command: "uv run --env-file .env python manage.py runserver"
    working_dir: "."
    depends_on:
      local-llm:
        condition: process_started
    availability:
      restart: on_failure
      backoff_seconds: 2
      max_restarts: 0

  worker:
    command: "uv run --env-file .env python manage.py db_worker"
    working_dir: "."
    depends_on:
      local-llm:
        condition: process_started
    availability:
      restart: on_failure
      backoff_seconds: 2
      max_restarts: 0
