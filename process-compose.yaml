version: "0.5"

environment:
  # Used by Postgres script and DATABASE_URL defaults in README / .env.sample
  - "AGENTPLANE_PG_PORT=55432"

processes:
  postgres:
    command: "bash scripts/run-dev-postgres.sh"
    working_dir: "."
    readiness_probe:
      exec:
        command: >-
          docker exec agentplane-postgres-dev pg_isready -U agentplane -d agentplane -q
      initial_delay_seconds: 2
      period_seconds: 2
      timeout_seconds: 5
      failure_threshold: 30
    availability:
      restart: on_failure
      backoff_seconds: 2
      max_restarts: 3

  local-llm:
    command: "bash scripts/run-local-llm.sh"
    working_dir: "."
    availability:
      restart: on_failure
      backoff_seconds: 2
      max_restarts: 3

  web:
    command: "uv run --env-file .env python manage.py runserver"
    working_dir: "."
    depends_on:
      postgres:
        condition: process_healthy
      local-llm:
        condition: process_started
    availability:
      restart: on_failure
      backoff_seconds: 2
      max_restarts: 0

  worker:
    command: "uv run --env-file .env python manage.py db_worker"
    working_dir: "."
    depends_on:
      postgres:
        condition: process_healthy
      local-llm:
        condition: process_started
    availability:
      restart: on_failure
      backoff_seconds: 2
      max_restarts: 0
