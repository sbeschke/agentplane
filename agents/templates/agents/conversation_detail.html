{% extends 'agents/base.html' %}
{% block content %}
    <h1 class="title">Conversation with {{ conversation.agent.name }}</h1>

    <div id="chat-history" class="content">
        {% include 'agents/partials/conversation_history.html' %}
    </div>

    <form id="message-form"
          hx-post="{% url 'conversation_detail' conversation.id %}"
          hx-target="#chat-history"
          hx-swap="innerHTML"
          hx-on::after-request="this.reset()">
        {% csrf_token %}
        <fieldset>
            <legend>Chat with {{ conversation.agent.name }}</legend>
            <textarea
                id="message"
                name="message"
                class="textarea"
                placeholder="Type your message here..."
                rows="10"
                cols="80"
                required></textarea>
            <button type="submit" class="button is-primary">Send</button>
        </fieldset>
    </form>
{% endblock %}
