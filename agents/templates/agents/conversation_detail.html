{% extends 'agents/base.html' %}
{% block content %}
    <h1 class="title">Conversation with {{ conversation.agent.name }}</h1>

    <div id="chat-history" class="content">
        {% for message in conversation.history %}
            <pre>{{ message }}</pre>
        {% endfor %}
    </div>

    <form id="message-form" action="{% url 'conversation_detail' conversation.id %}" method="post">
        {% csrf_token %}
        <fieldset>
            <legend>Chat with {{ conversation.agent.name }}</legend>
            <textarea
                id="message"
                name="message"
                class="textarea"
                placeholder="Type your message here..."
                rows="10"
                cols="80"
                required></textarea>
            <button type="submit" class="button is-primary">Send</button>
        </fieldset>
    </form>
{% endblock %}
