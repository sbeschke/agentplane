{% extends 'agents/base.html' %}
{% block content %}
    <h1 class="title">{{ agent.name }}</h1>
    <p>{{ agent.description }}</p>
    <form id="message-form" action="{% url 'chat' agent.slug %}" method="post">
        {% csrf_token %}
        <fieldset>
            <legend>Chat with {{ agent.name }}</legend>
            <textarea
                id="message"
                name="message"
                class="textarea"
                placeholder="Type your message here..."
                rows="10"
                cols="80"
                required></textarea>
            <button type="submit" class="button is-primary">Send</button>
        </fieldset>
    </form>
{% endblock %}
